<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" fill="none" role="img" aria-label="Primitive Labs security audit terminal">
  <defs>
    <clipPath id="tw"><rect width="900" height="280" rx="12"/></clipPath>
    <clipPath id="typ">
      <rect x="0" y="0" width="0" height="280">
        <animate attributeName="width" values="0;0;860;860;860;860" keyTimes="0;0.05;0.5;0.9;0.95;1" dur="6s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>
  <g clip-path="url(#tw)">
    <rect width="900" height="280" fill="#0a0c0b"/>
    <rect width="900" height="40" fill="#11211e"/>
    <circle cx="24" cy="20" r="6" fill="#e06a6a"/>
    <circle cx="46" cy="20" r="6" fill="#8a9a97"/>
    <circle cx="68" cy="20" r="6" fill="#B5C6C4"/>
    <text x="450" y="25" text-anchor="middle" font-family="monospace" font-size="13" fill="#8a9a97">operator@primitivelabs: ~/security-audit</text>

    <g font-family="monospace" font-size="16">
      <g clip-path="url(#typ)">
        <text x="24" y="78" fill="#B5C6C4">$ primitive scan --target business.example --deep --evidence</text>
      </g>
      <text x="24" y="108" fill="#8a9a97" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.55;1" dur="6s" repeatCount="indefinite"/>
        [+] recon .................. 142 endpoints
      </text>
      <text x="24" y="134" fill="#8a9a97" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.6;0.65;1" dur="6s" repeatCount="indefinite"/>
        [+] OWASP/API/infra ........ evaluated
      </text>
      <text x="24" y="160" fill="#e0a86a" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.7;0.75;1" dur="6s" repeatCount="indefinite"/>
        [!] exploitable risk ....... prioritized
      </text>
      <text x="24" y="186" fill="#B5C6C4" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.8;0.85;1" dur="6s" repeatCount="indefinite"/>
        [OK] executive + technical report generated
      </text>
      <text x="24" y="220" fill="#eef4f1" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.88;0.92;1" dur="6s" repeatCount="indefinite"/>
        $ <tspan fill="#B5C6C4">_</tspan>
      </text>
    </g>

    <rect x="1" y="1" width="898" height="278" rx="12" fill="none" stroke="#B5C6C4" stroke-opacity="0.2"/>
  </g>
</svg>
